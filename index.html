<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เที่ยวเมืองไทย - Amazing Thailand</title>
    <style>
        /* รีเซ็ตค่าพื้นฐาน */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
        }

        /* ส่วนหัวข้อ (Hero Section) */
        header {
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('https://images.unsplash.com/photo-1508009603885-50cf7c579365?auto=format&fit=crop&w=1200&q=80') no-repeat center center/cover;
            height: 40vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 20px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        /* ส่วนจัดวางรูปภาพ (Gallery Grid) */
        .gallery-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        /* การ์ดสถานที่ท่องเที่ยว */
        .gallery-item {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        .gallery-info {
            padding: 15px;
        }

        .gallery-info h3 {
            font-size: 1.2rem;
            margin-bottom: 5px;
            color: #2c3e50;
        }

        .gallery-info p {
            font-size: 0.9rem;
            color: #7f8c8d;
        }

        /* ฟุตเตอร์ */
        footer {
            text-align: center;
            padding: 20px;
            background-color: #2c3e50;
            color: white;
            margin-top: 40px;
        }

        /* ระบบ Pop-up ขยายรูป (Modal) */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            max-width: 80%;
            max-height: 80vh;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- ส่วนหัวข้อเว็บ -->
    <header>
        <h1>สำรวจสถานที่ท่องเที่ยวในประเทศไทย</h1>
        <p>รวมภาพความงดงามของเมืองไทยที่คุณต้องมาสัมผัสสักครั้ง</p>
    </header>

    <!-- ส่วนแกลเลอรี -->
    <div class="gallery-container">
        <div class="gallery-grid">
            
            <!-- การ์ดที่ 1 (ตัวอย่างรูปจากอินเทอร์เน็ต สามารถเปลี่ยนเองได้) -->
            <div class="gallery-item" onclick="openModal('https://images.unsplash.com/photo-1528181304800-259b08848526?auto=format&fit=crop&w=800&q=80')">
                <img src="https://images.unsplash.com/photo-1528181304800-259b08848526?auto=format&fit=crop&w=800&q=80" alt="วัดอรุณ">
                <div class="gallery-info">
                    <h3>วัดอรุณราชวราราม</h3>
                    <p>กรุงเทพมหานคร</p>
                </div>
            </div>

            <!-- การ์ดที่ 2 -->
            <div class="gallery-item" onclick="openModal('https://images.unsplash.com/photo-1537996194471-e657df975ab4?auto=format&fit=crop&w=800&q=80')">
                <img src="https://images.unsplash.com/photo-1537996194471-e657df975ab4?auto=format&fit=crop&w=800&q=80" alt="ทะเลภาคใต้">
                <div class="gallery-info">
                    <h3>เกาะพีพี</h3>
                    <p>จังหวัดกระบี่</p>
                </div>
            </div>

            <!-- การ์ดที่ 3 -->
            <div class="gallery-item" onclick="openModal('https://image-tc.galaxy.tf/wijpeg-sxrfid5inslt46adwg0pwpho/intanon.jpg=format&fit=crop&w=800&q=80')">
                <img src="https://image-tc.galaxy.tf/wijpeg-sxrfid5inslt46adwg0pwpho/intanon.jpg=format&fit=crop&w=800&q=80" alt="เชียงใหม่">
                <div class="gallery-info">
                    <h3>ดอยอินทนนท์</h3>
                    <p>จังหวัดเชียงใหม่</p>
                </div>
            </div>

            <!-- คุณสามารถเพิ่มการ์ดตรงนี้ได้เรื่อยๆ โดยก๊อปปี้โครงสร้างด้านบนไปวางต่อซ้ำๆ ได้เลยครับ -->

        </div>
    </div>

    <!-- หน้าต่าง Pop-up (Modal) -->
    <div id="myModal" class="modal" onclick="closeModal()">
        <span class="close-btn">&times;</span>
        <img class="modal-content" id="imgTarget">
    </div>

    <!-- ฟุตเตอร์ -->
    <footer>
        <p>&copy; 2026 Thailand Travel Gallery. All Rights Reserved.</p>
    </footer>

    <!-- JavaScript สำหรับระบบคลิกดูรูปภาพ -->
    <script>
        function openModal(imgSrc) {
            document.getElementById("myModal").style.display = "flex";
            document.getElementById("imgTarget").src = imgSrc;
        }

        function closeModal() {
            document.getElementById("myModal").style.display = "none";
        }
    </script>

</body>
</html>
